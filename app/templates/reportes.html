<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Ventas</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            padding:30px;
            color:#333;
        }

        .reporte-container{
            max-width:1200px;
            margin:auto;
        }

        .header{
            background:linear-gradient(135deg,#2563eb,#1e40af);
            color:white;
            padding:25px;
            border-radius:15px;
            margin-bottom:25px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .header h1{
            font-size:32px;
            margin-bottom:10px;
        }

        .header p{
            opacity:0.9;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card h3{
            color:#666;
            margin-bottom:10px;
            font-size:18px;
        }

        .card .valor{
            font-size:35px;
            font-weight:bold;
            color:#2563eb;
        }

        .contenido{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:25px;
        }

        .panel{
            background:white;
            border-radius:15px;
            padding:25px;
            box-shadow:0 4px 10px rgba(0,0,0,0.08);
        }

        .panel h2{
            margin-bottom:20px;
            color:#1e40af;
        }

        .tabla{
            width:100%;
            border-collapse:collapse;
        }

        .tabla th,
        .tabla td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:left;
        }

        .tabla th{
            background:#2563eb;
            color:white;
        }

        .tabla tr:hover{
            background:#f3f4f6;
        }

        canvas{
            width:100% !important;
            height:350px !important;
        }

        @media(max-width:900px){
            .contenido{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>

<div class="reporte-container">

    <!-- HEADER -->
    <div class="header">
        <h1>📊 Reporte General de Ventas</h1>
        <p>Sistema de análisis y estadísticas de productos</p>
    </div>

    <!-- TARJETAS -->
    <div class="cards">

        <div class="card">
            <h3>Total Ventas</h3>
            <div class="valor">{{ t_ventas }}</div>
        </div>

        <div class="card">
            <h3>Total Ingresos</h3>
            <div class="valor">Bs. {{ t_ingresos }}</div>
        </div>

    </div>

    <!-- CONTENIDO -->
    <div class="contenido">

        <!-- TABLA -->
        <div class="panel">
            <h2>📦 Ventas por Producto</h2>

            <table class="tabla">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                    </tr>
                </thead>

                <tbody>
                    {% for item in venta_por_producto %}
                    <tr>
                        <td>{{ item[0] }}</td>
                        <td>{{ item[1] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- GRAFICA -->
        <div class="panel">
            <h2>📈 Gráfico de Ventas</h2>

            <canvas id="grafica"></canvas>
        </div>

    </div>

</div>

<script>
window.onload = function () {

    const ctx = document.getElementById('grafica');

    const labels = {{ venta_por_producto|map(attribute=0)|list|tojson }};
    const data = {{ venta_por_producto|map(attribute=1)|list|tojson }};

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Ventas por Producto',
                data: data,
                backgroundColor: [
                    '#2563eb',
                    '#16a34a',
                    '#dc2626',
                    '#f59e0b',
                    '#7c3aed',
                    '#0891b2'
                ],
                borderRadius: 8,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

}
</script>

</body>
</html>
