{% extends "appbuilder/base.html" %}

{% block content %}
<div class="container" style="max-width: 1200px; margin-top: 20px;">

    <!-- TARJETAS -->
    <div class="row">
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-body">
                    <h4 style="color:#666; margin-bottom:10px;">Total Ventas</h4>
                    <div style="font-size:35px; font-weight:bold; color:#2563eb;">{{ t_ventas }}</div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-body">
                    <h4 style="color:#666; margin-bottom:10px;">Total Ingresos</h4>
                    <div style="font-size:35px; font-weight:bold; color:#2563eb;">Bs. {{ t_ingresos }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="row">

        <!-- TABLA -->
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading"><strong>Ventas por Producto</strong></div>
                <div class="panel-body">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in venta_por_producto %}
                            <tr>
                                <td>{{ item[0] }}</td>
                                <td>{{ item[1] }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- GRAFICA -->
        <div class="col-md-6">
            <div class="panel panel-default">
                <div class="panel-heading"><strong>Gráfico de Ventas</strong></div>
                <div class="panel-body">
                    <canvas id="grafica" style="max-height: 350px;"></canvas>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
window.onload = function () {
    const ctx = document.getElementById('grafica');
    const labels = {{ venta_por_producto|map(attribute=0)|list|tojson }};
    const data = {{ venta_por_producto|map(attribute=1)|list|tojson }};

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Ventas por Producto',
                data: data,
                backgroundColor: [
                    '#2563eb',
                    '#16a34a',
                    '#dc2626',
                    '#f59e0b',
                    '#7c3aed',
                    '#0891b2'
                ],
                borderRadius: 8,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
};
</script>
{% endblock %}
