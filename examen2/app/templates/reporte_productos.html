{% extends "appbuilder/base.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background:#f4f6f9;
            padding:30px;
            color:#333;
        }

        .container{
            max-width:1200px;
            margin:auto;
        }

        /* HEADER */
        .header{
            background:linear-gradient(135deg,#2563eb,#1e40af);
            color:white;
            padding:30px;
            border-radius:18px;
            margin-bottom:25px;
            box-shadow:0px 8px 20px rgba(0,0,0,0.15);
        }

        .header h1{
            font-size:34px;
            margin-bottom:8px;
        }

        .header p{
            opacity:0.9;
        }

        /* BOX */
        .box{
            background:white;
            padding:25px;
            border-radius:18px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.08);
            margin-bottom:25px;

            /* 🔥 CLAVE PARA QUE NO SE DEFORME */
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        h2{
            color:#1e3a8a;
            margin-bottom:20px;
        }

        /* 🔥 CONTENEDOR FIJO DEL GRAFICO */
        .chart-container{
            width: 100%;
            max-width: 500px;
            height: 500px;
        }

        canvas{
            width:100% !important;
            height:100% !important;
        }

        /* IA */
        .ia-box{
            background:linear-gradient(135deg,#ffffff,#f8fbff);
            border-radius:20px;
            padding:30px;
            box-shadow:0px 5px 18px rgba(0,0,0,0.08);
            border:1px solid #dbeafe;
            position:relative;
            overflow:hidden;
        }

        .ia-box::before{
            content:"🤖";
            position:absolute;
            top:-10px;
            right:20px;
            font-size:90px;
            opacity:0.08;
        }

        .ia-title{
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:20px;
        }

        .ia-title h2{
            margin:0;
            font-size:28px;
        }

        .badge{
            background:#2563eb;
            color:white;
            padding:6px 14px;
            border-radius:30px;
            font-size:13px;
            font-weight:bold;
        }

        .ia-content{
            background:white;
            padding:22px;
            border-radius:15px;
            line-height:1.9;
            font-size:17px;
            color:#374151;
            border-left:6px solid #2563eb;
            white-space:pre-line;
        }

        @media(max-width:900px){

            body{
                padding:15px;
            }

            .header h1{
                font-size:28px;
            }

            .chart-container{
                height:350px;
            }
        }

    </style>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>💰 Reporte de Productos</h1>
        <p>Ingresos generados por cada producto</p>
    </div>

    <!-- GRAFICA -->
    <div class="box">

        <h2>📊 Ingresos por Producto</h2>

        <div class="chart-container">
            <canvas id="graficaIngresos"></canvas>
        </div>

    </div>

    <!-- IA -->
    <div class="ia-box">

        <div class="ia-title">
            <h2>Análisis Inteligente</h2>
            <span class="badge">IA</span>
        </div>

        <div class="ia-content">
            {{ analisis_ia }}
        </div>

    </div>

</div>

<script>

const labels = {{ productos_ingresos | map(attribute=0) | list | tojson }};
const data = {{ productos_ingresos | map(attribute=1) | list | tojson }};

new Chart(document.getElementById("graficaIngresos"), {

    type: 'pie',

    data: {
        labels: labels,
        datasets: [{
            label: 'Ingresos',
            data: data,
            backgroundColor: [
                '#2563eb',
                '#16a34a',
                '#dc2626',
                '#f59e0b',
                '#7c3aed',
                '#0891b2',
                '#0f766e',
                '#ea580c'
            ],
            borderColor: "#ffffff",
            borderWidth: 2
        }]
    },

    options: {

        responsive: true,

        maintainAspectRatio: true,   // 🔥 clave para evitar deformación

        plugins: {
            legend: {
                position: 'right'
            }
        }
    }

});

</script>
{% endblock %}
